    <title>Fit Club</title>

  <body>
    <header>
      <a href="index.html" class="logo"><span>Fit</span>Club</a>
      <i class="bx bx-menu" id="menu-icon"></i>
      <nav id="navbar">
        <ul class="navbar">
          <li><a href="index.html">Accueil</a></li>

    <section class="form">
      <form>
        <table>
          <tr>
            <td>
              <label for="nom">Nom</label>
              <input type="text" id="nom" placeholder="Nom" required />
            </td>
            <td>
              <label for="pren">Prénom</label>
              <input type="text" id="pren" placeholder="Prénom" required />
            </td>
          </tr>
          <tr>
            <td>
              <label for="email">E-mail</label>
              <input type="email" id="email" placeholder="E-mail" required />
            </td>
            <td>
              <label for="tel">Téléphone</label>
              <input type="tel" id="tel" placeholder="Téléphone" required />
            </td>
          </tr>
          <tr>
            <td colspan="2">
              <input type="submit" value="Envoyer" class="env" />
            </td>
          </tr>
        </table>
      </form>
    </section>
    <footer>
      <div class="social_media">
        <a href="https://www.facebook.com/fitclub.com"
